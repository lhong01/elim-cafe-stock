<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Stock — ELIM Café</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brown: #6B3A2A; --gold: #C8923A;
      --cream: #FFF8F0; --bg: #F5EDE4; --card: #FFFFFF;
      --text: #2C1810; --text-muted: #7A5548;
      --ok: #2D9B6F; --ok-bg: #E8F7F1;
      --warn: #C87820; --warn-bg: #FDF3E3;
      --danger: #C03030; --danger-bg: #FDEAEA;
      --border: #E8D5C8; --shadow: 0 2px 8px rgba(107,58,42,0.10);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding-bottom: 70px;
    }

    /* ── Loading ── */
    #loading-overlay {
      position: fixed; inset: 0; background: var(--brown);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
      z-index: 1000; transition: opacity 0.4s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    #loading-overlay .icon { font-size: 40px; }
    #loading-overlay .msg  { color: white; font-size: 14px; opacity: 0.8; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,0.3); border-top-color: white;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Header / Nav ── */
    header {
      background: var(--brown); color: white;
      padding: 16px 20px 12px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header p  { font-size: 12px; opacity: 0.75; margin-top: 2px; }
    nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-top: 1px solid var(--border);
      display: flex; z-index: 100;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
    }
    nav button {
      flex: 1; border: none; background: none; padding: 10px 4px 8px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      cursor: pointer; color: var(--text-muted); font-size: 10px;
    }
    nav button.active { color: var(--brown); }
    nav button svg { width: 22px; height: 22px; }
    nav button span { font-weight: 500; }

    /* ── Panels / Cards ── */
    .panel { display: none; padding: 16px; }
    .panel.active { display: block; }
    .card {
      background: var(--card); border-radius: 12px; padding: 16px;
      margin-bottom: 10px; box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .card-title {
      font-size: 13px; font-weight: 700; color: var(--brown);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;
    }

    /* ── Location groups (cierre / compra) ── */
    .loc-group { margin-bottom: 4px; }
    .loc-header {
      font-size: 11px; font-weight: 700; color: var(--brown);
      text-transform: uppercase; letter-spacing: 0.6px;
      background: var(--bg); padding: 5px 8px; border-radius: 6px;
      margin: 10px 0 4px;
    }
    .loc-group:first-child .loc-header { margin-top: 0; }

    /* ── Compact rows ── */
    .compact-row {
      display: flex; align-items: center;
      padding: 7px 0; border-bottom: 1px solid var(--border); gap: 8px;
    }
    .compact-row:last-child { border-bottom: none; }
    .compact-name { flex: 1; min-width: 0; font-size: 13px; font-weight: 500; }
    .compact-before { display: block; font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    /* ── Counter ── */
    .counter { display: flex; align-items: center; gap: 5px; }
    .counter button {
      width: 32px; height: 32px; border-radius: 8px;
      border: 1.5px solid var(--border); background: var(--cream);
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--brown); font-weight: 700;
    }
    .counter button:active { background: var(--border); }
    .counter input {
      width: 44px; text-align: center;
      border: 1.5px solid var(--border); border-radius: 8px;
      padding: 5px 2px; font-size: 15px; font-weight: 600;
      color: var(--text); background: white;
    }
    .counter input:focus { outline: none; border-color: var(--brown); }

    /* ── Buttons ── */
    .btn {
      display: block; width: 100%; padding: 14px; border: none;
      border-radius: 12px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s, transform 0.1s; text-align: center;
    }
    .btn:active { opacity: 0.85; transform: scale(0.98); }
    .btn-primary   { background: var(--brown); color: white; }
    .btn-secondary { background: var(--gold);  color: white; }
    .btn-outline   { background: white; color: var(--brown); border: 2px solid var(--brown); }

    /* ── Form ── */
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px;
    }
    .form-group select {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 15px; background: white; color: var(--text);
      appearance: none; -webkit-appearance: none;
    }
    .form-group select:focus { outline: none; border-color: var(--brown); }

    /* ── Alertas ── */
    .alert-item {
      display: flex; align-items: center;
      padding: 11px; border-radius: 10px; margin-bottom: 7px; gap: 11px;
    }
    .alert-item:last-child { margin-bottom: 0; }
    .alert-item.ok     { background: var(--ok-bg);     }
    .alert-item.warn   { background: var(--warn-bg);   }
    .alert-item.danger { background: var(--danger-bg); }
    .alert-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .ok     .alert-dot { background: var(--ok);     }
    .warn   .alert-dot { background: var(--warn);   }
    .danger .alert-dot { background: var(--danger); }
    .alert-info { flex: 1; min-width: 0; }
    .alert-name   { font-size: 14px; font-weight: 600; }
    .alert-detail { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .alert-status {
      font-size: 11px; font-weight: 700; padding: 3px 8px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0;
    }
    .ok     .alert-status { color: var(--ok);     background: rgba(45,155,111,0.15); }
    .warn   .alert-status { color: var(--warn);   background: rgba(200,120,32,0.15); }
    .danger .alert-status { color: var(--danger); background: rgba(192,48,48,0.15);  }

    /* ── Historial ── */
    .hist-item {
      padding: 10px 0; border-bottom: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-start;
    }
    .hist-item:last-child { border-bottom: none; }
    .hist-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .hist-icon.cierre { background: #E8F0FD; }
    .hist-icon.compra { background: #E8F7F1; }
    .hist-body  { flex: 1; min-width: 0; }
    .hist-title { font-size: 13px; font-weight: 600; }
    .hist-sub   { font-size: 12px; color: var(--text-muted); margin-top: 2px; word-break: break-word; }
    .hist-date  { font-size: 11px; color: var(--text-muted); flex-shrink: 0; text-align: right; min-width: 56px; }

    /* ── Consumption note ── */
    .consumption-note {
      font-size: 12px; color: var(--text-muted);
      background: var(--bg); padding: 8px 12px; border-radius: 8px;
      margin-top: 12px; line-height: 1.6;
    }
    .consumption-note strong { color: var(--danger); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #2C1810; color: white; padding: 10px 20px;
      border-radius: 20px; font-size: 13px; font-weight: 500;
      opacity: 0; transition: opacity 0.3s, transform 0.3s;
      z-index: 200; white-space: nowrap; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Cierre row ── */
    .cierre-antes { text-align: center; min-width: 42px; flex-shrink: 0; }
    .cierre-antes span { display: block; font-size: 10px; color: var(--text-muted); }
    .cierre-antes strong { font-size: 16px; color: var(--brown); font-weight: 700; }
    .cierre-result { font-size: 15px; font-weight: 700; min-width: 28px; text-align: center; flex-shrink: 0; }
    .counter input.neg { color: var(--danger); border-color: var(--danger); }
    .counter input.pos { color: var(--ok);     border-color: var(--ok);     }

    /* ── Email Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      z-index: 300; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-box {
      background: white; border-radius: 16px; padding: 20px;
      max-width: 420px; width: 100%; max-height: 80vh; overflow-y: auto;
    }
    .modal-title {
      font-size: 16px; font-weight: 700; color: var(--brown); margin-bottom: 12px;
    }
    .modal-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .modal-item:last-child { border-bottom: none; }
    .modal-item .badge {
      font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 12px;
      text-transform: uppercase; flex-shrink: 0;
    }
    .badge-danger { background: var(--danger-bg); color: var(--danger); }
    .badge-warn   { background: var(--warn-bg);   color: var(--warn);   }
    .modal-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }

    /* ── Empty ── */
    .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 40px; margin-bottom: 10px; }
    .empty-text { font-size: 14px; }

    /* ── Compra add-note ── */
    .add-note {
      font-size: 12px; color: var(--text-muted);
      background: var(--ok-bg); padding: 8px 12px; border-radius: 8px;
      margin-top: 12px; line-height: 1.6;
    }
    .add-note strong { color: var(--ok); }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="icon">☕</div>
  <div class="spinner"></div>
  <div class="msg">Cargando stock...</div>
</div>

<header>
  <h1>☕ ELIM Café — Stock</h1>
  <p id="header-date"></p>
</header>

<!-- CIERRE -->
<div id="panel-cierre" class="panel active">
  <div id="cierre-content"></div>
  <button class="btn btn-primary" style="margin-top:4px" onclick="guardarCierre()">Registrar Cierre</button>
</div>

<!-- COMPRA -->
<div id="panel-compra" class="panel">
  <div id="compra-content"></div>
  <button class="btn btn-secondary" style="margin-top:4px" onclick="guardarCompra()">Registrar Compra</button>
</div>

<!-- ALERTAS -->
<div id="panel-alertas" class="panel">
  <div class="card">
    <div class="card-title">Estado del Stock</div>
    <div id="alertas-list"></div>
  </div>
</div>

<!-- HISTORIAL -->
<div id="panel-historial" class="panel">
  <div class="card">
    <div class="card-title">Últimos Registros</div>
    <div id="historial-list"></div>
  </div>
</div>

<!-- EMAIL MODAL -->
<div id="email-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title">⚠️ Stock bajo detectado</div>
    <p style="font-size:13px; color:var(--text-muted); margin-bottom:12px;">
      Los siguientes productos requieren atención:
    </p>
    <div id="email-modal-items"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="enviarEmail()">Enviar alerta por email</button>
      <button class="btn btn-outline" onclick="cerrarEmailModal()">Cerrar</button>
    </div>
  </div>
</div>

<!-- NAV -->
<nav>
  <button class="active" onclick="showPanel('cierre', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/>
    </svg>
    <span>Cierre</span>
  </button>
  <button onclick="showPanel('compra', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    <span>Compra</span>
  </button>
  <button onclick="showPanel('alertas', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    <span>Alertas</span>
  </button>
  <button onclick="showPanel('historial', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    <span>Historial</span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, onValue, push, query, limitToLast } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

// ─── FIREBASE ─────────────────────────────────────────
const app = initializeApp({
  apiKey: "AIzaSyAIGSS2hM_LRxFnhzJu59_UVXpQgL-PTzc",
  authDomain: "elim-cafe-stock.firebaseapp.com",
  databaseURL: "https://elim-cafe-stock-default-rtdb.firebaseio.com",
  projectId: "elim-cafe-stock",
  storageBucket: "elim-cafe-stock.firebasestorage.app",
  messagingSenderId: "49096842793",
  appId: "1:49096842793:web:28d354718db3d533980638"
});
const db = getDatabase(app);

// ─── PRODUCTOS ────────────────────────────────────────
// Jugos & Leche: se guardan en UNIDADES. Compra en PACKS (1 pack = 12 u).
const JUGOS = [
  { id: 'jugo_mango', nombre: 'Mango'   },
  { id: 'jugo_duraz', nombre: 'Durazno' },
  { id: 'jugo_naran', nombre: 'Naranja' },
];
const LECHE_PRODS = [
  { id: 'leche', nombre: 'Leche' },
];
const OTROS_PRODS = [
  { id: 'cafe',        nombre: 'Granos de café',  unidad: 'Bolsa 3kg'   },
  { id: 'nesquik',     nombre: 'Nesquik',          unidad: 'Bolsa'       },
  { id: 'choco',       nombre: 'Choco en barra',   unidad: 'Unidad'      },
  { id: 'caramel',     nombre: 'Syrup Caramel',    unidad: 'Botella'     },
  { id: 'vaso240',     nombre: 'Vasos 240ml',      unidad: 'Pack x50'    },
  { id: 'vaso330',     nombre: 'Vasos 330ml',      unidad: 'Pack x50'    },
  { id: 'vaso_iced',   nombre: 'Vaso Iced',        unidad: 'Pack x50'    },
  { id: 'pajitas',     nombre: 'Pajitas',           unidad: 'Bolsa'       },
  { id: 'servilletas', nombre: 'Servilletas',       unidad: 'Caja 100u'  },
];
const PRODUCTOS = [...JUGOS, ...LECHE_PRODS, ...OTROS_PRODS];

// Jugos & Leche tienen heladera; OTROS solo tienen deposito/oficina (Arriba/Abajo)
const PACK_PRODS = new Set([...JUGOS, ...LECHE_PRODS].map(p => p.id));

// ─── ALERTAS CONFIG ───────────────────────────────────
// Para jugos & leche: valor alertas = floor(total_unidades / 12) → en packs
const ALERTAS_CFG = {
  cafe:        { min: 1,  ideal: 3,  displayUnit: 'bolsa 3kg',  pack: false },
  leche:       { min: 1,  ideal: 4,  displayUnit: 'pack (x12)', pack: true  },
  jugo_mango:  { min: 1,  ideal: 4,  displayUnit: 'pack (x12)', pack: true  },
  jugo_duraz:  { min: 1,  ideal: 4,  displayUnit: 'pack (x12)', pack: true  },
  jugo_naran:  { min: 1,  ideal: 4,  displayUnit: 'pack (x12)', pack: true  },
  vaso240:     { min: 4,  ideal: 12, displayUnit: 'pack x50',   pack: false },
  vaso330:     { min: 4,  ideal: 12, displayUnit: 'pack x50',   pack: false },
  vaso_iced:   { min: 4,  ideal: 12, displayUnit: 'pack x50',   pack: false },
  pajitas:     { min: 1,  ideal: 4,  displayUnit: 'bolsa',      pack: false },
  nesquik:     { min: 1,  ideal: 6,  displayUnit: 'bolsa',      pack: false },
  choco:       { min: 10, ideal: 30, displayUnit: 'unidad',     pack: false },
  caramel:     { min: 1,  ideal: 3,  displayUnit: 'botella',    pack: false },
  servilletas: { min: 1,  ideal: 4,  displayUnit: 'caja 100u',  pack: false },
};

const LOC_LABELS = { heladera: 'Heladera', deposito: 'Pasillo', oficina: 'Oficina' };

// ─── ESTADO ───────────────────────────────────────────
function defaultStock() {
  const s = {};
  PRODUCTOS.forEach(p => { s[p.id] = { heladera: 0, deposito: 0, oficina: 0 }; });
  return s;
}

let stock = defaultStock();
let historial = [];
let cierreValues = {};   // { [prodId]: { heladera, deposito, oficina } }
let compraValues = {};   // { [prodId]: { deposito, oficina } } — packs para PACK_PRODS, unidades para OTROS
let appReady = false;
let pendingAlertItems = [];

// ─── FIREBASE LISTENERS ───────────────────────────────
onValue(ref(db, 'stock'), (snapshot) => {
  const data = snapshot.val() || {};
  PRODUCTOS.forEach(p => {
    stock[p.id] = { heladera: 0, deposito: 0, oficina: 0, ...(data[p.id] || {}) };
  });

  if (!appReady) {
    appReady = true;
    initCierreValues();
    initCompraValues();
    hideLoading();
  }

  const active = document.querySelector('.panel.active')?.id;
  if (active === 'panel-alertas') renderAlertas();
});

onValue(query(ref(db, 'historial'), limitToLast(20)), (snapshot) => {
  historial = [];
  snapshot.forEach(child => historial.unshift(child.val()));
  renderHistorial();
});

function saveStock() {
  set(ref(db, 'stock'), stock).catch(e => console.error('saveStock:', e));
}

function addHistorial(entry) {
  push(ref(db, 'historial'), { ...entry, fecha: new Date().toISOString() })
    .catch(e => console.error('addHistorial:', e));
}

// ─── LOADING ──────────────────────────────────────────
function hideLoading() {
  const overlay = document.getElementById('loading-overlay');
  overlay.classList.add('hidden');
  setTimeout(() => overlay.style.display = 'none', 400);
  renderCierre();
  renderCompra();
  renderAlertas();
}

setTimeout(() => {
  if (!appReady) {
    document.querySelector('#loading-overlay .msg').textContent = 'Sin conexión — revisá el Wi-Fi';
  }
}, 8000);

// ─── NAVEGACIÓN ───────────────────────────────────────
function showPanel(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'cierre')    renderCierre();
  if (name === 'compra')    renderCompra();
  if (name === 'alertas')   renderAlertas();
  if (name === 'historial') renderHistorial();
}
window.showPanel = showPanel;

// ─── HELPERS ──────────────────────────────────────────
function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('es-AR', { day: 'numeric', month: 'short' }) +
         ' ' + d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

function getAlertValue(prodId) {
  const s = stock[prodId] || {};
  const total = (s.heladera || 0) + (s.deposito || 0) + (s.oficina || 0);
  return ALERTAS_CFG[prodId]?.pack ? Math.floor(total / 12) : total;
}

function getStatus(prodId) {
  const cfg = ALERTAS_CFG[prodId];
  if (!cfg) return 'ok';
  const val = getAlertValue(prodId);
  if (val < cfg.min)   return 'danger';
  if (val < cfg.ideal) return 'warn';
  return 'ok';
}

function getAlertItems() {
  return PRODUCTOS
    .map(p => ({ ...p, status: getStatus(p.id), val: getAlertValue(p.id), cfg: ALERTAS_CFG[p.id] }))
    .filter(p => p.status !== 'ok' && p.cfg)
    .sort((a, b) => (a.status === 'danger' ? -1 : 1));
}

// ─── CIERRE ───────────────────────────────────────────
function initCierreValues() {
  PRODUCTOS.forEach(p => {
    cierreValues[p.id] = { heladera: 0, deposito: 0, oficina: 0 };
  });
}

function buildCierreRows(prods, locs, unitLabel) {
  return locs.map(loc => `
    <div class="loc-group">
      <div class="loc-header">${loc === 'heladera' ? 'Heladera' : loc === 'deposito' ? 'Pasillo' : 'Oficina'}</div>
      ${prods.map(p => {
        const antes = stock[p.id]?.[loc] || 0;
        const delta = cierreValues[p.id]?.[loc] ?? 0;
        const result = Math.max(0, antes + delta);
        const unit   = unitLabel || p.unidad || '';
        const cls    = delta < 0 ? 'neg' : delta > 0 ? 'pos' : '';
        return `
          <div class="compact-row">
            <div class="compact-name">
              ${p.nombre}
              <span class="compact-before">${unit}</span>
            </div>
            <div class="cierre-antes"><span>antes</span><strong>${antes}</strong></div>
            <div class="counter">
              <button onclick="adjustCierre('${p.id}','${loc}',-1)">−</button>
              <input type="number" id="cierre-${p.id}-${loc}" value="${delta}" class="${cls}"
                     oninput="setCierreValue('${p.id}','${loc}',this.value)">
              <button onclick="adjustCierre('${p.id}','${loc}',1)">+</button>
            </div>
            <div class="cierre-result" id="cierre-result-${p.id}-${loc}">${result}</div>
          </div>`;
      }).join('')}
    </div>
  `).join('');
}

function renderCierre() {
  if (!appReady) return;
  // Keep in-progress values (only init missing)
  PRODUCTOS.forEach(p => {
    if (!cierreValues[p.id]) {
      cierreValues[p.id] = {
        heladera: stock[p.id]?.heladera || 0,
        deposito: stock[p.id]?.deposito || 0,
        oficina:  stock[p.id]?.oficina  || 0,
      };
    }
  });

  document.getElementById('cierre-content').innerHTML = `
    <div class="card">
      <div class="card-title">Jugos</div>
      ${buildCierreRows(JUGOS, ['heladera','deposito','oficina'], 'u')}
    </div>
    <div class="card">
      <div class="card-title">Leches</div>
      ${buildCierreRows(LECHE_PRODS, ['heladera','deposito','oficina'], 'u')}
    </div>
    <div class="card">
      <div class="card-title">Otros</div>
      ${buildCierreRows(OTROS_PRODS, ['deposito','oficina'], null)}
      <div class="consumption-note" id="cierre-note" style="display:none">
        Cambios: <strong id="cierre-consumo-text"></strong>
      </div>
    </div>
  `;
  updateCierreNote();
}

function adjustCierre(prodId, loc, delta) {
  if (!cierreValues[prodId]) cierreValues[prodId] = { heladera:0, deposito:0, oficina:0 };
  const antes   = stock[prodId]?.[loc] || 0;
  const current = cierreValues[prodId][loc] || 0;
  cierreValues[prodId][loc] = Math.max(-antes, current + delta);
  _syncCierreUI(prodId, loc, antes);
  updateCierreNote();
}
window.adjustCierre = adjustCierre;

function setCierreValue(prodId, loc, val) {
  if (!cierreValues[prodId]) cierreValues[prodId] = { heladera:0, deposito:0, oficina:0 };
  const antes = stock[prodId]?.[loc] || 0;
  cierreValues[prodId][loc] = Math.max(-antes, parseInt(val) || 0);
  _syncCierreUI(prodId, loc, antes);
  updateCierreNote();
}
window.setCierreValue = setCierreValue;

function _syncCierreUI(prodId, loc, antes) {
  const d       = cierreValues[prodId][loc] || 0;
  const input   = document.getElementById(`cierre-${prodId}-${loc}`);
  const resultEl = document.getElementById(`cierre-result-${prodId}-${loc}`);
  if (input)    { input.value = d; input.className = d < 0 ? 'neg' : d > 0 ? 'pos' : ''; }
  if (resultEl) { resultEl.textContent = Math.max(0, antes + d); }
}

function updateCierreNote() {
  const note = document.getElementById('cierre-note');
  if (!note) return;
  const diffs = [];
  PRODUCTOS.forEach(p => {
    const locs = PACK_PRODS.has(p.id) ? ['heladera','deposito','oficina'] : ['deposito','oficina'];
    locs.forEach(loc => {
      const delta = cierreValues[p.id]?.[loc] || 0;
      if (delta !== 0) {
        diffs.push(`${p.nombre} [${LOC_LABELS[loc]}]: ${delta > 0 ? '+' : ''}${delta}`);
      }
    });
  });
  if (diffs.length > 0) {
    note.style.display = 'block';
    document.getElementById('cierre-consumo-text').textContent = diffs.join(' · ');
  } else {
    note.style.display = 'none';
  }
}

function guardarCierre() {
  const cambios = [];
  PRODUCTOS.forEach(p => {
    const locs = PACK_PRODS.has(p.id) ? ['heladera','deposito','oficina'] : ['deposito','oficina'];
    locs.forEach(loc => {
      const delta = cierreValues[p.id]?.[loc] || 0;
      if (delta !== 0) {
        const antes   = stock[p.id]?.[loc] || 0;
        const despues = Math.max(0, antes + delta);
        cambios.push({ nombre: p.nombre, loc, antes, despues });
        stock[p.id][loc] = despues;
      }
    });
  });

  if (cambios.length === 0) { showToast('Sin cambios para registrar'); return; }

  saveStock();
  addHistorial({
    tipo: 'cierre',
    resumen: `Cierre: ${cambios.length} cambio(s)`,
    detalle: cambios.map(c => `${c.nombre} [${LOC_LABELS[c.loc]}]: antes ${c.antes} → ahora ${c.despues}`).join('\n'),
  });

  // Reset cierre values to new stock
  initCierreValues();
  showToast(`✓ Cierre registrado — ${cambios.length} cambios`);
  renderCierre();

  // Email alert
  pendingAlertItems = getAlertItems();
  if (pendingAlertItems.length > 0) showEmailModal(pendingAlertItems);
}
window.guardarCierre = guardarCierre;

// ─── COMPRA ───────────────────────────────────────────
function initCompraValues() {
  PRODUCTOS.forEach(p => {
    compraValues[p.id] = { deposito: 0, oficina: 0 };
  });
}

function buildCompraRows(prods, locs, unitLabel) {
  return locs.map(loc => `
    <div class="loc-group">
      <div class="loc-header">${loc === 'deposito' ? 'Pasillo' : 'Oficina'}</div>
      ${prods.map(p => {
        const val  = compraValues[p.id]?.[loc] || 0;
        const unit = unitLabel || p.unidad || '';
        return `
          <div class="compact-row">
            <div class="compact-name">
              ${p.nombre}
              <span class="compact-before">${unit} · en stock: ${stock[p.id]?.[loc] || 0}</span>
            </div>
            <div class="counter">
              <button onclick="adjustCompra('${p.id}','${loc}',-1)">−</button>
              <input type="number" id="compra-${p.id}-${loc}" value="${val}" min="0"
                     oninput="setCompraValue('${p.id}','${loc}',this.value)">
              <button onclick="adjustCompra('${p.id}','${loc}',1)">+</button>
            </div>
          </div>`;
      }).join('')}
    </div>
  `).join('');
}

function renderCompra() {
  if (!appReady) return;
  PRODUCTOS.forEach(p => {
    if (!compraValues[p.id]) compraValues[p.id] = { deposito: 0, oficina: 0 };
  });

  document.getElementById('compra-content').innerHTML = `
    <div class="card">
      <div class="card-title">Jugos</div>
      <p style="font-size:12px; color:var(--text-muted); margin-bottom:10px">Ingresá en packs · 1 pack = 12 unidades</p>
      ${buildCompraRows(JUGOS, ['deposito','oficina'], 'Pack (x12)')}
    </div>
    <div class="card">
      <div class="card-title">Leches</div>
      <p style="font-size:12px; color:var(--text-muted); margin-bottom:10px">Ingresá en packs · 1 pack = 12 unidades</p>
      ${buildCompraRows(LECHE_PRODS, ['deposito','oficina'], 'Pack (x12)')}
    </div>
    <div class="card">
      <div class="card-title">Otros</div>
      ${buildCompraRows(OTROS_PRODS, ['deposito','oficina'], null)}
      <div class="add-note" id="compra-note" style="display:none">
        A agregar: <strong id="compra-note-text"></strong>
      </div>
    </div>
  `;
  updateCompraNote();
}

function adjustCompra(prodId, loc, delta) {
  if (!compraValues[prodId]) compraValues[prodId] = { deposito:0, oficina:0 };
  compraValues[prodId][loc] = Math.max(0, (compraValues[prodId][loc] || 0) + delta);
  const el = document.getElementById(`compra-${prodId}-${loc}`);
  if (el) el.value = compraValues[prodId][loc];
  updateCompraNote();
}
window.adjustCompra = adjustCompra;

function setCompraValue(prodId, loc, val) {
  if (!compraValues[prodId]) compraValues[prodId] = { deposito:0, oficina:0 };
  compraValues[prodId][loc] = Math.max(0, parseInt(val) || 0);
  updateCompraNote();
}
window.setCompraValue = setCompraValue;

function updateCompraNote() {
  const note = document.getElementById('compra-note');
  if (!note) return;
  const items = [];
  PRODUCTOS.forEach(p => {
    ['deposito','oficina'].forEach(loc => {
      const qty = compraValues[p.id]?.[loc] || 0;
      if (qty > 0) {
        const isPack = PACK_PRODS.has(p.id);
        const label  = isPack ? `${qty} pack (${qty*12}u)` : `${qty}`;
        items.push(`${p.nombre} [${loc === 'deposito' ? 'Pasillo' : 'Oficina'}]: +${label}`);
      }
    });
  });
  if (items.length > 0) {
    note.style.display = 'block';
    document.getElementById('compra-note-text').textContent = items.join(' · ');
  } else {
    note.style.display = 'none';
  }
}

function guardarCompra() {
  const cambios = [];
  PRODUCTOS.forEach(p => {
    ['deposito','oficina'].forEach(loc => {
      const qty = compraValues[p.id]?.[loc] || 0;
      if (qty > 0) {
        const isPack = PACK_PRODS.has(p.id);
        const units  = isPack ? qty * 12 : qty;
        stock[p.id][loc] = (stock[p.id][loc] || 0) + units;
        const label = isPack ? `+${qty} pack (${units}u)` : `+${qty}`;
        cambios.push({ nombre: p.nombre, loc, label });
      }
    });
  });

  if (cambios.length === 0) { showToast('Sin cantidades para registrar'); return; }

  saveStock();
  addHistorial({
    tipo: 'compra',
    resumen: `Compra: ${cambios.length} producto(s)`,
    detalle: cambios.map(c => `${c.nombre} [${c.loc === 'deposito' ? 'Pasillo' : 'Oficina'}]: ${c.label}`).join('\n'),
  });

  initCompraValues();
  showToast(`✓ Compra registrada — ${cambios.length} productos`);
  renderCompra();
}
window.guardarCompra = guardarCompra;

// ─── ALERTAS ──────────────────────────────────────────
function renderAlertas() {
  const label  = { ok: 'OK', warn: 'Bajo', danger: 'Urgente' };
  const order  = { danger: 0, warn: 1, ok: 2 };
  const sorted = [...PRODUCTOS]
    .filter(p => ALERTAS_CFG[p.id])
    .sort((a, b) => order[getStatus(a.id)] - order[getStatus(b.id)]);

  document.getElementById('alertas-list').innerHTML = sorted.map(p => {
    const cfg    = ALERTAS_CFG[p.id];
    const status = getStatus(p.id);
    const val    = getAlertValue(p.id);
    const s      = stock[p.id] || {};
    const partes = [];
    if ((s.heladera || 0) > 0) partes.push(`Hel: ${s.heladera}`);
    if ((s.deposito || 0) > 0) partes.push(`Pas: ${s.deposito}`);
    if ((s.oficina  || 0) > 0) partes.push(`Ofi: ${s.oficina}`);
    const loc = partes.length ? partes.join(' · ') : 'Sin stock';
    const displayVal = cfg.pack ? `${val} packs` : `${val} ${cfg.displayUnit}`;

    return `
      <div class="alert-item ${status}">
        <div class="alert-dot"></div>
        <div class="alert-info">
          <div class="alert-name">${p.nombre}</div>
          <div class="alert-detail">Total: <strong>${displayVal}</strong> · Mín: ${cfg.min} · Ideal: ${cfg.ideal}</div>
          <div class="alert-detail" style="margin-top:2px">${loc}</div>
        </div>
        <div class="alert-status">${label[status]}</div>
      </div>`;
  }).join('');
}

// ─── EMAIL MODAL ──────────────────────────────────────
function showEmailModal(items) {
  const statusLabel = { danger: 'Urgente', warn: 'Bajo' };
  document.getElementById('email-modal-items').innerHTML = items.map(p => `
    <div class="modal-item">
      <span class="badge ${p.status === 'danger' ? 'badge-danger' : 'badge-warn'}">${statusLabel[p.status]}</span>
      <span style="flex:1"><strong>${p.nombre}</strong></span>
      <span style="font-size:12px; color:var(--text-muted)">${p.val} / ${p.cfg.ideal} ${p.cfg.displayUnit}</span>
    </div>
  `).join('');
  document.getElementById('email-modal').style.display = 'flex';
}

function cerrarEmailModal() {
  document.getElementById('email-modal').style.display = 'none';
}
window.cerrarEmailModal = cerrarEmailModal;

function enviarEmail() {
  const items = pendingAlertItems;
  const urgentes = items.filter(i => i.status === 'danger');
  const bajos    = items.filter(i => i.status === 'warn');

  const fecha = new Date().toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
  let body = `Reporte de stock ELIM Café — ${fecha}\n\n`;

  if (urgentes.length > 0) {
    body += '🔴 URGENTE — Comprar esta semana:\n';
    urgentes.forEach(p => {
      body += `  • ${p.nombre}: ${p.val} ${p.cfg.displayUnit} (mín: ${p.cfg.min}, ideal: ${p.cfg.ideal})\n`;
    });
    body += '\n';
  }
  if (bajos.length > 0) {
    body += '🟡 BAJO — Revisar:\n';
    bajos.forEach(p => {
      body += `  • ${p.nombre}: ${p.val} ${p.cfg.displayUnit} (mín: ${p.cfg.min}, ideal: ${p.cfg.ideal})\n`;
    });
  }

  const subject = 'URGENTE: Compras ELIM Café requeridas para esta semana';
  const mailto  = `mailto:lucio-hong01@hotmail.com,elimcafesomang@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailto;
  cerrarEmailModal();
}
window.enviarEmail = enviarEmail;

// ─── HISTORIAL ────────────────────────────────────────
function renderHistorial() {
  const icons = { cierre: '📋', compra: '🛒' };

  if (historial.length === 0) {
    document.getElementById('historial-list').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📭</div>
        <div class="empty-text">No hay registros todavía</div>
      </div>`;
    return;
  }

  document.getElementById('historial-list').innerHTML = historial.map(h => `
    <div class="hist-item">
      <div class="hist-icon ${h.tipo || 'cierre'}">${icons[h.tipo] || '📄'}</div>
      <div class="hist-body">
        <div class="hist-title">${h.resumen || ''}</div>
        <div class="hist-sub">${(h.detalle || '').split('\n').join('<br>')}</div>
      </div>
      <div class="hist-date">${h.fecha ? formatDate(h.fecha) : ''}</div>
    </div>
  `).join('');
}

// ─── INIT ─────────────────────────────────────────────
document.getElementById('header-date').textContent =
  new Date().toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
</script>
</body>
